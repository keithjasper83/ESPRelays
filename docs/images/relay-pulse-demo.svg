<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 340" role="img" aria-label="Relay pulse demo">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#081326"/>
      <stop offset="100%" stop-color="#163C5A"/>
    </linearGradient>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1200" height="340" rx="20" fill="url(#bg)"/>
  <text x="52" y="72" font-family="Segoe UI, Arial, sans-serif" font-size="34" fill="#E2F3FF" font-weight="700">Live Relay Rhythm</text>
  <text x="52" y="104" font-family="Segoe UI, Arial, sans-serif" font-size="19" fill="#B9D8F0">A tiny visual of scheduled pulse behavior and status feedback.</text>

  <g transform="translate(52,150)">
    <rect x="0" y="0" width="1096" height="136" rx="14" fill="#0D243A" stroke="#2E597D"/>

    <line x1="40" y1="68" x2="1056" y2="68" stroke="#5B8CB3" stroke-opacity="0.55" stroke-width="3"/>

    <g fill="#89B8DA">
      <circle cx="120" cy="68" r="8"/>
      <circle cx="260" cy="68" r="8"/>
      <circle cx="400" cy="68" r="8"/>
      <circle cx="540" cy="68" r="8"/>
      <circle cx="680" cy="68" r="8"/>
      <circle cx="820" cy="68" r="8"/>
      <circle cx="960" cy="68" r="8"/>
    </g>

    <g filter="url(#softGlow)">
      <circle cx="120" cy="68" r="18" fill="#3B82F6" opacity="0.92">
        <animate attributeName="cx" values="120;960;120" dur="6s" repeatCount="indefinite"/>
      </circle>
      <circle cx="120" cy="68" r="10" fill="#EAF6FF">
        <animate attributeName="cx" values="120;960;120" dur="6s" repeatCount="indefinite"/>
      </circle>
    </g>

    <rect x="930" y="28" width="140" height="80" rx="10" fill="#0A3F2B" stroke="#37C48E"/>
    <text x="1000" y="58" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="14" fill="#A9EFD1">RELAY</text>
    <text x="1000" y="84" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="24" fill="#D5FFE9" font-weight="700">ON</text>
    <animate xlink:href="#relayLight" attributeName="opacity" values="0.4;1;0.4" dur="1.2s" repeatCount="indefinite"/>

    <circle id="relayLight" cx="898" cy="68" r="12" fill="#34D399" opacity="0.5">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="1.2s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>
