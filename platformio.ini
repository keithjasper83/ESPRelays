[platformio]
default_envs = esp32-c3-devkitm-1

[env:esp32-c3-devkitm-1]
platform = espressif32
board = esp32-c3-devkitm-1
framework = arduino

monitor_speed = 115200
upload_port = COM4
monitor_port = COM4

build_flags =
  -D ARDUINO_USB_MODE=1
  -D ARDUINO_USB_CDC_ON_BOOT=1

lib_deps =
  knolleary/PubSubClient

[env:native]
platform = native
test_framework = unity
test_build_src = no
extra_scripts =
  pre:test/native_coverage.py
build_flags =
  -std=gnu++17
  --coverage
  -I test/support
  -I src
link_flags = --coverage
